<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Timer Challenge - Login</title>

    <link rel="stylesheet" href="css/login.css">

</head>

<body>

    <div class="background"></div>

    <div class="login-container">

        <div class="logo-box">

            <h1>⏱</h1>

            <h2>Timer Challenge</h2>

            <p>Test Your Perfect Timing</p>

        </div>

        <form id="loginForm">

            <div class="input-box">

                <label>Full Name</label>

                <input
                    type="text"
                    id="name"
                    placeholder="Enter your full name"
                    required>

            </div>

            <div class="input-box">

                <label>Mobile Number</label>

                <input
                    type="tel"
                    id="mobile"
                    placeholder="Enter mobile number"
                    maxlength="10"
                    required>

            </div>

            <div class="input-box">

                <label>Email Address</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter email"
                    required>

            </div>

            <div class="input-box">

                <label>Password</label>

                <input
                    type="password"
                    id="password"
                    placeholder="Create password"
                    required>

            </div>

            <div class="input-box">

                <label>Confirm Password</label>

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm password"
                    required>

            </div>

            <button
                type="submit"
                class="login-btn">

                Continue

            </button>

        </form>

        <div class="bottom-text">

            <p>

                Already have an account?

                <a href="#">Login</a>

            </p>

        </div>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
