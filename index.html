<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Timer Challenge Game</title>

    <link
        rel="stylesheet"
        href="css/style.css">

</head>

<body>

<div class="background"></div>

<div class="game-container">

    <header>

        <h1>
            ⏱ Timer Challenge
        </h1>

        <p>
            Stop the timer at the perfect moment
        </p>

    </header>

    <section class="player-section">

        <div class="player-card">

            <h3>Player</h3>

            <h2 id="playerName">
                Guest
            </h2>

        </div>

        <div class="mode-card">

            <h3>Mode</h3>

            <h2 id="gameMode">
                Easy
            </h2>

        </div>

    </section>

    <section class="target-section">

        <h3>

            🎯 Target Time

        </h3>

        <h2 id="targetTime">

            10 Seconds

        </h2>

    </section>

    <section class="timer-section">

        <div
            id="timer">

            0.00

        </div>

    </section>

    <section class="button-section">

        <button
            id="startBtn">

            ▶ Start

        </button>

        <button
            id="stopBtn">

            ⏹ Stop

        </button>

        <button
            id="resetBtn">

            🔄 Reset

        </button>

    </section>

    <section class="progress-section">

        <div class="progress">

            <div
                id="progressBar">

            </div>

        </div>

    </section>

    <section class="status-section">

        <div class="status-box">

            <h4>🏆 Score</h4>

            <span id="score">

                0

            </span>

        </div>

        <div class="status-box">

            <h4>⭐ Stars</h4>

            <span id="stars">

                0

            </span>

        </div>

        <div class="status-box">

            <h4>🪙 Coins</h4>

            <span id="coins">

                0

            </span>

        </div>

        <div class="status-box">

            <h4>❤️ Lives</h4>

            <span id="lives">

                3

            </span>

        </div>

    </section>

    <section class="result-section">

        <div
            id="result">

            Press Start To Play

        </div>

    </section>

</div>

<script
    src="js/script.js">

</script>

</body>

</html>
